# =============================================================================
# .github/workflows/ci.yml
# -----------------------------------------------------------------------------
# 역할: PR(및 main push)마다 결정적 품질 검사를 수행한다.
#   - lint : eslint (npm run lint)
#   - build: next build — 타입체크가 빌드 과정에 포함되어 함께 검증됨
#
# ⚠️ build 단계는 클라이언트 Supabase 클라이언트가 모듈 로드 시 읽는
#    공개 환경변수 2개가 필요하다. service_role 이 아니라 브라우저에 노출되는
#    "공개값"이므로 Secret 이 아닌 Variables 로 등록한다
#    (Settings → Secrets and variables → Actions → Variables 탭):
#       NEXT_PUBLIC_SUPABASE_URL
#       NEXT_PUBLIC_SUPABASE_ANON_KEY
# =============================================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main] # 머지 후 main 재검증 (PR 브랜치는 pull_request로 이미 검사돼 중복 방지)

# 같은 브랜치에 새 커밋이 오면 이전 검사 실행은 취소.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 린트
        run: npm run lint

      - name: 빌드 (타입체크 포함)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
